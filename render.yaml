# Render blueprint for the MedVerse FastAPI backend.
# https://render.com/docs/blueprint-spec
#
# Architecture: the backend runs **without a Bluetooth radio** in the
# cloud. The mobile app owns BLE end-to-end and pushes snapshots to
# `POST /api/snapshot/ingest` every 15 s, plus attaches the freshest
# snapshot in the body of every `/api/agent/*` and `/api/digital-twin/*`
# call. So the backend is purely the AI / FHIR / persistence brain;
# disabling the BLE thread is mandatory (see MEDVERSE_DISABLE_BLE).
#
# After connecting this repo as a Blueprint, fill the `sync: false`
# env vars in the Render dashboard. Groq keys default to one shared
# value if you only set GROQ_API_KEY — per-specialty overrides only
# matter when you want independent rate-limit accounting.
#
# Plan choice: **free** — current setup, $0/mo. Trade-offs:
#   • Service sleeps after 15 min idle (30–60 s cold start on next req)
#   • No persistent disk available on free tier — Chroma RAG history,
#     SQLite chats/snapshots, and uploaded images all reset on every
#     redeploy. The app falls back to ephemeral paths inside /app and
#     keeps working; data just doesn't survive deploys.
#   • 750 build-hours/mo limit (one service fits comfortably)
# Upgrade to **starter** ($7/mo, 512 MB) to add a persistent disk +
# always-on; **standard** ($25/mo, 2 GB) for production-quality LLM
# concurrency.

services:
  - type: web
    name: medverse-api
    # Docker runtime — see Dockerfile + docker-entrypoint.sh. Required
    # over the Python buildpack because Render's buildpack runs the app
    # as a non-root user that can't chown a mounted disk; Docker lets
    # the entrypoint chown as root and drop privileges via gosu before
    # exec'ing the app. Harmless on free tier (no disk to chown) but
    # the right default for any future paid tier with persistence.
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    # No `disk:` — free tier doesn't support persistent disks. App uses
    # ephemeral paths inside /app: ./aegis_local.db, ./chroma_data,
    # ./uploads. All wiped on every redeploy. Add a disk + bump plan to
    # starter when you need persistence.

    envVars:
      # ── Architecture flags ────────────────────────────────────────
      # Cloud has no Bluetooth radio. Mobile is the BLE master and
      # pushes snapshots via /api/snapshot/ingest.
      - key: MEDVERSE_DISABLE_BLE
        value: "true"
      # Background agent loop runs every 60 s by default — costs Groq
      # tokens with no user driving it. Mandatory off on free tier so
      # the app sleeps cleanly after 15 min idle.
      - key: MEDVERSE_DISABLE_AGENT_LOOP
        value: "true"
      # Auth off by default; flip to "true" + set MEDVERSE_JWT_SECRET
      # when the frontend ships JWT login.
      - key: MEDVERSE_AUTH_ENABLED
        value: "false"

      # ── User-supplied secrets (set in the Render dashboard) ───────
      # Either set the shared GROQ_API_KEY only (every specialty falls
      # back to it) OR set per-specialty keys for independent rate
      # limits. See src/llms/groqllm.py.
      - key: GROQ_API_KEY
        sync: false
      - key: CARDIOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: PULMONARY_EXPERT_GROQ_API_KEY
        sync: false
      - key: NEUROLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: DERMATOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: GYNECOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: OCULOMETRIC_EXPERT_GROQ_API_KEY
        sync: false
      - key: GENERAL_PHYSICIAN_GROQ_API_KEY
        sync: false

      # JWT signing secret — only needed when MEDVERSE_AUTH_ENABLED=true.
      - key: MEDVERSE_JWT_SECRET
        sync: false

      # Postgres URL — leave unset on free tier (SQLite fallback works).
      # To wire managed Postgres later: provision via Render dashboard
      # (basic_256mb $6/mo) OR BYO (Neon free tier, Supabase) and paste
      # the connection string here. App normalises postgres:// to the
      # right driver in src/utils/db.py.
      - key: MEDVERSE_DB_URL
        sync: false

      # CORS allowlist — comma-separated. Include your frontend
      # domain(s) e.g.
      # https://medverse.vercel.app,https://medverse-staging.vercel.app
      # The CORS regex in app.py also auto-allows localhost / LAN IPs
      # for dev; this var only matters for production frontends.
      - key: MEDVERSE_CORS_ORIGINS
        sync: false

  # ── Postgres (omitted intentionally) ────────────────────────────────
  # The app falls back to SQLite (ephemeral on free tier — wiped on
  # redeploy). To add managed Postgres:
  #   1. Render dashboard → New → PostgreSQL → pick `free` (90-day) or
  #      `basic_256mb` ($6/mo). Copy the Internal Database URL into
  #      MEDVERSE_DB_URL above and redeploy.
  #   2. BYO: Neon free tier or Supabase free tier. Same drill — paste
  #      the connection string into MEDVERSE_DB_URL.
  # Both trigger Alembic migrations on first boot.

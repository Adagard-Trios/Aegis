# Render blueprint for the MedVerse FastAPI backend.
# https://render.com/docs/blueprint-spec
#
# Architecture: the backend runs **without a Bluetooth radio** in the
# cloud. The mobile app owns BLE end-to-end and pushes snapshots to
# `POST /api/snapshot/ingest` every 15 s, plus attaches the freshest
# snapshot in the body of every `/api/agent/*` and `/api/digital-twin/*`
# call. So the backend is purely the AI / FHIR / persistence brain;
# disabling the BLE thread is mandatory (see MEDVERSE_DISABLE_BLE).
#
# After connecting this repo as a Blueprint, fill the `sync: false`
# env vars in the Render dashboard. Groq keys default to one shared
# value if you only set GROQ_API_KEY — per-specialty overrides only
# matter when you want independent rate-limit accounting.
#
# Plan choice: **standard** ($25/mo, 2 GB RAM) — comfortable for
# LangGraph + Chroma + sklearn adapters together. Drop to **starter**
# ($7/mo, 1 GB) only if you also flip `MEDVERSE_DISABLE_AGENT_LOOP=true`
# and accept that Chroma RAG history will OOM on first index. **Free**
# is unsuitable: 30-second cold starts after 15 min idle ruin SSE +
# the snapshot-ingest loop misses windows.

services:
  - type: web
    name: medverse-api
    # Docker runtime — see Dockerfile + docker-entrypoint.sh. The Python
    # buildpack runtime works too, but disks mounted under any path get
    # root-owned permissions and the buildpack's app user can't chown
    # them. Docker fixes this because the entrypoint runs as root and
    # drops privileges via gosu after chown'ing the disk.
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    # Persistent disk for Chroma RAG history + uploaded lab/skin/retinal
    # images. Without this, both reset on every redeploy. 1 GB is
    # enough for the bundled rare-disease KB + a few hundred uploads.
    #
    # NB: mount paths under /var/ get restrictive root-owned perms on
    # Render's Python runtime (non-root app process can't write). Use
    # /data instead — the runtime user has write access there.
    disk:
      name: medverse-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0

      # ── Architecture flags ────────────────────────────────────────
      # Cloud has no Bluetooth radio. Mobile is the BLE master and
      # pushes snapshots via /api/snapshot/ingest.
      - key: MEDVERSE_DISABLE_BLE
        value: "true"
      # Background agent loop runs every 60 s by default — costs Groq
      # tokens with no user driving it. Flip on if you want continuous
      # alerting; off is fine when the mobile app drives requests.
      - key: MEDVERSE_DISABLE_AGENT_LOOP
        value: "true"
      # Auth off by default; flip to "true" + set MEDVERSE_JWT_SECRET
      # when the frontend ships JWT login.
      - key: MEDVERSE_AUTH_ENABLED
        value: "false"

      # ── Storage paths (mounted to the persistent disk above) ──────
      # SQLite fallback if MEDVERSE_DB_URL isn't set. Both Postgres
      # and SQLite go through the same migrations.
      - key: MEDVERSE_SQLITE_PATH
        value: /data/medverse.db
      # Chroma vector store (per-specialty history collections).
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      # Uploaded clinical images (skin + retinal) live here. The
      # /api/upload-image route writes <patient>/<modality>/<ts>.png.
      - key: MEDVERSE_UPLOADS_DIR
        value: /data/uploads

      # ── Models / runtime adapters ─────────────────────────────────
      # The 12 trainable pipelines under models/<slug>/ download large
      # datasets (PTB-XL = 25 GB, ISIC = 25 GB) on first train — way
      # past Render's disk cap. Train + export weights locally; the
      # runtime adapters look here for the pickle files.
      - key: MEDVERSE_MODELS_DIR
        value: /data/models

      # ── User-supplied secrets (set in the Render dashboard) ───────
      # Either set the shared GROQ_API_KEY only (every specialty falls
      # back to it) OR set per-specialty keys for independent rate
      # limits. See src/llms/groqllm.py.
      - key: GROQ_API_KEY
        sync: false
      - key: CARDIOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: PULMONARY_EXPERT_GROQ_API_KEY
        sync: false
      - key: NEUROLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: DERMATOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: GYNECOLOGY_EXPERT_GROQ_API_KEY
        sync: false
      - key: OCULOMETRIC_EXPERT_GROQ_API_KEY
        sync: false
      - key: GENERAL_PHYSICIAN_GROQ_API_KEY
        sync: false

      # JWT signing secret — only needed when MEDVERSE_AUTH_ENABLED=true.
      - key: MEDVERSE_JWT_SECRET
        sync: false

      # Postgres / Timescale (preferred). Use `postgresql+asyncpg://`
      # prefix; src/utils/db.py normalises for psycopg2 internally.
      # Provision via the Render Postgres add-on or any managed PG.
      # If unset, falls back to SQLite at MEDVERSE_SQLITE_PATH.
      - key: MEDVERSE_DB_URL
        sync: false

      # CORS allowlist — comma-separated. Include your frontend
      # domain(s) e.g.
      # https://medverse.vercel.app,https://medverse-staging.vercel.app
      # The CORS regex in app.py also auto-allows localhost / LAN IPs
      # for dev; this var only matters for production frontends.
      - key: MEDVERSE_CORS_ORIGINS
        sync: false

  # ── Postgres (Render-managed) ───────────────────────────────────────
  # Comment out if you'd rather BYO Postgres (Timescale Cloud, Neon,
  # Supabase, etc.) and just paste the connection string into
  # MEDVERSE_DB_URL above. Render's free PG expires after 90 days; the
  # paid Starter is $7/mo and covers the snapshot + alerts + ledger
  # write rate this app actually generates.
databases:
  - name: medverse-pg
    plan: starter
    databaseName: medverse
    user: medverse

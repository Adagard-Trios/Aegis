[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; upload_port / monitor_port left unset so PlatformIO auto-detects the
; serial device. Was hardcoded to COM3 which broke for anyone whose ESP32
; enumerates differently (COM5 on Windows, /dev/ttyUSB0 on Linux/Mac).
; Override per-machine with `pio run -t upload --upload-port=COM5` if needed.
upload_speed = 115200
board_build.flash_mode = dio

; NimBLE replaces the bundled Bluedroid stack — frees ~70 KB of RAM and
; gives us the same notify-throughput characteristics as the vest firmware.
; ArduinoJson dropped: the BLE payload now uses the same compact ASCII
; key:value format as the vest, parsed cheaply on the backend with split().
; Partition scheme with more app space (BLE stack is still large).
board_build.partitions = min_spiffs.csv

lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit BusIO @ ^1.14.0
inputs:
  - { name: ch0_mean, dtype: float64 }
  - { name: ch0_std,  dtype: float64 }
  - { name: ch0_p95,  dtype: float64 }
  - { name: ch1_mean, dtype: float64 }
  - { name: ch1_std,  dtype: float64 }
  - { name: ch1_p95,  dtype: float64 }
  - { name: ch2_mean, dtype: float64 }
  - { name: ch2_std,  dtype: float64 }
  - { name: ch2_p95,  dtype: float64 }
  - { name: ch3_mean, dtype: float64 }
  - { name: ch3_std,  dtype: float64 }
  - { name: ch3_p95,  dtype: float64 }

target:
  name: target           # 0=quiet 1=normal 2=hyperactive
  dtype: int64

categorical: []
drift_tolerance: 0.05
